name: Market News Update

on:
  # Ausloesung erfolgt zuverlaessig extern ueber cron-job.org (siehe README.md),
  # kein eigener schedule-Trigger (siehe Begruendung in alerts.yml/gold.yml).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  news-check:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: News pruefen und ggf. senden
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python news_check.py

      - name: State-Datei zurueckschreiben
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_state.json
          git diff --staged --quiet || git commit -m "Update news state [skip ci]"
          git push
