name: Gold Daily Update

on:
  # Ausloesung erfolgt zuverlaessig extern ueber cron-job.org (siehe README.md).
  # Kein eigener schedule-Trigger hier, da GitHubs interner Zeitplan unzuverlaessig
  # ist und sonst zu zufaelligen Doppel-Nachrichten fuehren kann.
  workflow_dispatch: {}

jobs:
  gold-update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Gold-Update senden
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --mode gold
