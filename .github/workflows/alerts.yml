name: Market Alerts

on:
  # Ausloesung erfolgt zuverlaessig extern ueber cron-job.org (siehe README.md).
  # Kein eigener schedule-Trigger hier, da GitHubs interner Zeitplan unzuverlaessig
  # ist und sonst zu zufaelligen Doppel-Laeufen fuehren kann.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Alerts pruefen und ggf. senden
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --mode alerts

      - name: State-Datei zurueckschreiben
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update alert state [skip ci]"
          git push
